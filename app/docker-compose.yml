services:

  postgres:

    image: postgres:17

    container_name: inventory_postgres

    restart: always

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:

    build: .

    container_name: inventory_backend

    restart: always

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

volumes:
  postgres_data: